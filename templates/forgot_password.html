{% extends "base.html" %}
{% block content %}

<h1>Password dimenticata</h1>

<form method="post" action="/forgot-password">
  <label>Email</label><br>
  <input name="email" type="email" required><br><br>
  <button type="submit">Invia codice</button>
</form>

<hr style="margin:16px 0;">

<h2>Reset password</h2>
<form method="post" action="/reset-password">
  <label>Email</label><br>
  <input name="email" type="email" required><br><br>

  <label>Codice</label><br>
  <input name="code" required><br><br>

  <label>Nuova password</label><br>
  <div style="position: relative; width: 250px;">
    <input id="password" name="new_password" type="password" required
           style="width:100%; padding-right:35px;">
    <span onclick="togglePassword()" 
          style="position:absolute; right:8px; top:50%; 
                 transform:translateY(-50%); cursor:pointer;">
        👁
    </span>
</div>

  <button type="submit">Cambia password</button>
</form>

{% if message %}
<p style="margin-top:12px;">{{ message }}</p>
{% endif %}

<script>
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

{% endblock %}
